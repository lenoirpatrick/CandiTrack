# Configuration de l'analyse SonarQube Cloud (issue #25).
# Le projet est analysé par le workflow .github/workflows/sonarqube.yml.

# Identité du projet sur SonarQube Cloud (https://sonarcloud.io).
sonar.projectKey=lenoirpatrick_CandiTrack
sonar.organization=lenoirpatrick

# Sources analysées et tests.
sonar.sources=canditrack,tracking,manage.py
sonar.tests=tracking/tests.py

# Couverture de code produite par le workflow (coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.14

# Exclusions des sources « main » : migrations générées, artefacts hors
# périmètre, et le fichier de tests (déclaré dans sonar.tests, il ne doit pas
# être indexé aussi comme source — les ensembles doivent être disjoints).
sonar.exclusions=**/migrations/**,**/__pycache__/**,staticfiles/**,media/**,chrome-extension/**,**/tests.py

# Encodage des sources.
sonar.sourceEncoding=UTF-8
