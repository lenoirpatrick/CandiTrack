{% extends "base.html" %}
{% block title %}Supprimer le CV — CandiTrack{% endblock %}
{% block content %}
<h1>Supprimer le CV</h1>
<div class="card">
    <p>Supprimer définitivement le CV <strong>{{ cv.label }}</strong> et son fichier ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn" style="background:#c0392b;">Supprimer</button>
        <a class="btn secondary" href="{% url 'tracking:cv_list' %}">Annuler</a>
    </form>
</div>
{% endblock %}
