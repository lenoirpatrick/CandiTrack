{% comment %}Sortable column header (issue #11). Expects: key, label, sort/dir/q and show_archived from context.{% endcomment %}
{% spaceless %}
<th>
    {% if sort == key and dir == "asc" %}
        <a href="?{% if show_archived %}archivees=1&{% endif %}{% if q %}q={{ q|urlencode }}&{% endif %}sort={{ key }}&dir=desc">{{ label }} ▲</a>
    {% elif sort == key %}
        <a href="?{% if show_archived %}archivees=1&{% endif %}{% if q %}q={{ q|urlencode }}&{% endif %}sort={{ key }}&dir=asc">{{ label }} ▼</a>
    {% else %}
        <a href="?{% if show_archived %}archivees=1&{% endif %}{% if q %}q={{ q|urlencode }}&{% endif %}sort={{ key }}&dir=asc">{{ label }}</a>
    {% endif %}
</th>
{% endspaceless %}
