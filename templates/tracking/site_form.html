{% extends "base.html" %}
{% block title %}{{ title }} — CandiTrack{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top:1rem;">
            <button type="submit" class="btn">Enregistrer</button>
            <a class="btn secondary" href="{% url 'tracking:site_list' %}">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
