<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<style>
  body { font-family: system-ui, "Segoe UI", sans-serif; max-width: 460px; margin: 2rem auto; padding: 0 1rem; color: #1f2937; }
  h1 { font-size: 1.1rem; color: #2d6cdf; }
  label { display: block; font-weight: 600; margin: 1rem 0 0.2rem; }
  input { width: 100%; box-sizing: border-box; padding: 0.5rem; border: 1px solid #d6dae1; border-radius: 6px; font: inherit; }
  button { margin-top: 1.2rem; background: #2d6cdf; color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; font: inherit; }
  .muted { color: #6b7280; font-size: 0.85rem; }
  .saved { color: #1c7c43; margin-left: 0.6rem; }
</style>
</head>
<body>
  <h1>Options CandiTrack</h1>
  <label for="baseUrl">URL du backend CandiTrack</label>
  <input id="baseUrl" type="url" placeholder="http://127.0.0.1:8000">
  <p class="muted">Si ce n'est pas une URL locale, ajoutez-la aussi dans
     <code>host_permissions</code> du <code>manifest.json</code>.</p>

  <label for="token">Jeton API (CANDITRACK_API_TOKEN)</label>
  <input id="token" type="password" placeholder="Collez votre jeton ici">
  <p class="muted">Identique à <code>CANDITRACK_API_TOKEN</code> de votre fichier <code>.env</code>.</p>

  <div><button id="save">Enregistrer</button><span id="saved" class="saved"></span></div>
  <script src="options.js"></script>
</body>
</html>
