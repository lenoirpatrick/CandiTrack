{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CandiTrack{% endblock %}</title>
    <style>
        :root { --bg:#f7f8fa; --card:#fff; --border:#e2e5ea; --accent:#2d6cdf; --muted:#6b7280; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
               background: var(--bg); color:#1f2937; }
        header { background: var(--card); border-bottom:1px solid var(--border); }
        nav { max-width: 1000px; margin:0 auto; padding:0 1rem; display:flex; gap:1rem; align-items:center; }
        nav .brand { font-weight:700; padding:1rem 0; margin-right:1rem; color:var(--accent); }
        nav a { color:#374151; text-decoration:none; padding:1rem 0.25rem; }
        nav a:hover { color: var(--accent); }
        main { max-width: 1000px; margin:1.5rem auto; padding:0 1rem; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:10px;
                padding:1rem 1.25rem; margin-bottom:1rem; }
        table { width:100%; border-collapse: collapse; }
        th, td { text-align:left; padding:0.5rem 0.6rem; border-bottom:1px solid var(--border); }
        th { color:var(--muted); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.03em; }
        .btn { display:inline-block; background:var(--accent); color:#fff; padding:0.5rem 0.9rem;
               border-radius:8px; text-decoration:none; border:none; cursor:pointer; font-size:0.95rem; }
        .btn.secondary { background:#eef1f6; color:#374151; }
        .badge { display:inline-block; background:#eef1f6; color:#374151; padding:0.15rem 0.55rem;
                 border-radius:999px; font-size:0.8rem; }
        form p { margin:0.6rem 0; }
        label { display:block; font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
        input, select, textarea { width:100%; padding:0.45rem 0.55rem; border:1px solid var(--border);
                 border-radius:8px; font:inherit; }
        .messages { list-style:none; padding:0; }
        .messages li { background:#e7f5ec; border:1px solid #bfe3cd; padding:0.6rem 0.9rem;
                 border-radius:8px; margin-bottom:0.5rem; }
        .muted { color: var(--muted); }
        .row-actions a { margin-right:0.5rem; }
    </style>
</head>
<body>
<header>
    <nav>
        <span class="brand">CandiTrack</span>
        <a href="{% url 'tracking:candidature_list' %}">Candidatures</a>
        <a href="{% url 'tracking:site_list' %}">Sites</a>
        <a href="{% url 'tracking:stats' %}">Stats</a>
        <a href="{% url 'tracking:cv_list' %}">CV</a>
        <a href="/admin/" style="margin-left:auto;" class="muted">Admin</a>
    </nav>
</header>
<main>
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
