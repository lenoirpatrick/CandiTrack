# Publication de l'image Docker sur Docker Hub (issue #18) + release (issue #24).
#
# Déclenché à la fermeture d'un milestone : le titre du milestone sert de
# version. Le workflow rattache d'abord les issues fermées sans milestone à ce
# milestone (pour grouper la release), construit et pousse l'image avec les tags
# `latest` et `<version>`, puis crée une release GitHub du nom du milestone
# listant les issues traitées (avec l'archive source en pièce jointe).
#
# Prérequis (une seule fois) — Settings → Secrets and variables → Actions :
#   - DOCKERHUB_USERNAME : identifiant Docker Hub (= namespace de l'image)
#   - DOCKERHUB_TOKEN    : access token Docker Hub (Account → Security)
name: Docker publish

on:
  milestone:
    types: [closed]
  # Déclenchement manuel : republier une version donnée (ex. après un changement
  # d'architecture d'image) sans attendre la fermeture d'un milestone.
  workflow_dispatch:
    inputs:
      version:
        description: "Version (tag de l'image, ex. 1.0.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # créer la release et son tag (issue #24)
      issues: write    # rattacher les issues au milestone
    steps:
      - name: Récupérer la dernière version de main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Déterminer la version (titre du milestone ou saisie manuelle)
        id: version
        run: |
          version="${{ github.event.milestone.title || inputs.version }}"
          if [ -z "$version" ]; then
            echo "::error::Aucune version : ni titre de milestone ni saisie manuelle."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version à publier : $version"

      - name: Rattacher les issues fermées sans milestone à ce milestone
        if: github.event_name == 'milestone'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MILESTONE_NUMBER: ${{ github.event.milestone.number }}
        run: |
          set -euo pipefail
          # Issues fermées et sans milestone (l'API web masque les milestones
          # fermés, on assigne donc par numéro via l'API REST).
          numbers=$(gh issue list --repo "$REPO" --state closed \
            --search "no:milestone" --limit 200 --json number --jq '.[].number')
          if [ -z "$numbers" ]; then
            echo "Aucune issue fermée sans milestone."
          else
            for n in $numbers; do
              echo "Issue #$n → milestone #$MILESTONE_NUMBER"
              gh api -X PATCH "repos/$REPO/issues/$n" -F milestone="$MILESTONE_NUMBER"
            done
          fi

      - name: Authentification Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Préparer QEMU (émulation pour le build ARM)
        uses: docker/setup-qemu-action@v3

      - name: Préparer Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push de l'image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 pour serveurs/PC, arm64 pour Raspberry Pi (64 bits).
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/canditrack:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/canditrack:${{ steps.version.outputs.version }}

      - name: Créer la release du milestone (issue #24)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/canditrack
        run: |
          set -euo pipefail
          # Issues traitées (fermées) du milestone, pour le corps de la release.
          issues=$(gh issue list --repo "$REPO" --milestone "$VERSION" --state closed \
            --limit 200 --json number,title --jq '.[] | "- #\(.number) \(.title)"' || true)
          [ -z "$issues" ] && issues="_Aucune issue listée pour ce milestone._"
          notes=$(printf 'Image Docker : `%s:%s`\n\n### Issues traitées\n%s\n' \
            "$IMAGE" "$VERSION" "$issues")
          # Idempotent : éditer la release si elle existe déjà, sinon la créer.
          # GitHub attache automatiquement l'archive source (le « package »).
          if gh release view "$VERSION" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$VERSION" --repo "$REPO" --title "$VERSION" --notes "$notes"
          else
            gh release create "$VERSION" --repo "$REPO" --target main \
              --title "$VERSION" --notes "$notes"
          fi
