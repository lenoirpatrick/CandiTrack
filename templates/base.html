{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}CandiTrack{% endblock %}</title>
    <script>
        // Pré-réglages avant paint pour éviter tout flash (thème #4, sidebar #35).
        (function () {
            try {
                var t = localStorage.getItem("theme");
                if (t) document.documentElement.setAttribute("data-theme", t);
                if (localStorage.getItem("sidebar") === "collapsed")
                    document.documentElement.setAttribute("data-sidebar", "collapsed");
            } catch (e) {}
        })();
    </script>
    <style>
        /* Palette projet (issue #14) — voir docs/palette.md :
           080E20 090F23 0A1127 0B132B 1C2541 3A506B 5BC0BE */
        :root {
            --bg:#f4f6fa; --card:#ffffff; --border:#dce3ec; --accent:#3a506b;
            --muted:#5a6b85; --text:#0b132b; --nav-link:#1c2541;
            --chip-bg:#e7ecf4; --chip-text:#1c2541; --track:#e7ecf4;
            --msg-bg:#e3f4f3; --msg-border:#bfe3e2; --input-bg:#ffffff;
            --sidebar-bg:#ffffff; --sidebar-hover:#eef2f8; --accent-soft:rgba(58,80,107,0.12);
            --radius:12px; --radius-sm:8px;
            --shadow:0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.08);
            --shadow-lg:0 10px 30px rgba(16,24,40,0.12);
        }
        /* Follow the OS preference unless the user explicitly chose light. */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg:#0b132b; --card:#1c2541; --border:#3a506b; --accent:#5bc0be;
                --muted:#8fa3bf; --text:#e6ecf5; --nav-link:#c7d2e2;
                --chip-bg:#243156; --chip-text:#c7d2e2; --track:#1c2541;
                --msg-bg:#123a39; --msg-border:#2e5d5b; --input-bg:#0a1127;
                --sidebar-bg:#0e1730; --sidebar-hover:#1c2541; --accent-soft:rgba(91,192,190,0.16);
                --shadow:0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.35);
                --shadow-lg:0 16px 40px rgba(0,0,0,0.5);
            }
        }
        /* Explicit dark choice always wins. */
        :root[data-theme="dark"] {
            --bg:#0b132b; --card:#1c2541; --border:#3a506b; --accent:#5bc0be;
            --muted:#8fa3bf; --text:#e6ecf5; --nav-link:#c7d2e2;
            --chip-bg:#243156; --chip-text:#c7d2e2; --track:#1c2541;
            --msg-bg:#123a39; --msg-border:#2e5d5b; --input-bg:#0a1127;
            --sidebar-bg:#0e1730; --sidebar-hover:#1c2541; --accent-soft:rgba(91,192,190,0.16);
            --shadow:0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.35);
            --shadow-lg:0 16px 40px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
               background: var(--bg); color:var(--text); }
        /* Liens de contenu : suivre la palette plutôt que le bleu/violet du navigateur. */
        a { color: var(--accent); }
        a:visited { color: var(--accent); }
        a:hover { color: var(--text); }

        /* ===== Mise en page : sidebar rétractable (issue #35) ===== */
        .app { display:flex; min-height:100vh; }
        .sidebar {
            --sb-w:240px;
            flex:0 0 var(--sb-w); width:var(--sb-w);
            background:var(--sidebar-bg); border-right:1px solid var(--border);
            display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
            transition:flex-basis .22s ease, width .22s ease; z-index:1100;
        }
        :root[data-sidebar="collapsed"] .sidebar { --sb-w:72px; }
        .sidebar-top { display:flex; align-items:center; gap:0.6rem; padding:0.9rem 0.8rem;
                 min-height:60px; border-bottom:1px solid var(--border); }
        .sidebar-toggle { background:none; border:1px solid var(--border); color:var(--text);
                 width:38px; height:38px; flex:0 0 38px; border-radius:var(--radius-sm); cursor:pointer;
                 font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:background .15s; }
        .sidebar-toggle:hover { background:var(--sidebar-hover); }
        .brand { font-weight:800; color:var(--accent); font-size:1.15rem; letter-spacing:0.2px;
                 white-space:nowrap; overflow:hidden; }
        .sidebar-nav { display:flex; flex-direction:column; gap:0.15rem; padding:0.6rem 0.5rem; flex:1; }
        .sidebar-foot { padding:0.6rem 0.5rem; border-top:1px solid var(--border);
                 display:flex; flex-direction:column; gap:0.15rem; }
        .nav-item { position:relative; display:flex; align-items:center; gap:0.8rem;
                 padding:0.6rem 0.7rem; border-radius:var(--radius-sm); text-decoration:none;
                 color:var(--nav-link); font-weight:600; font-size:0.95rem; white-space:nowrap;
                 transition:background .15s, color .15s; }
        .nav-item:hover { background:var(--sidebar-hover); color:var(--accent); }
        .nav-item.active { background:var(--accent-soft); color:var(--accent); }
        .nav-item.active::before { content:""; position:absolute; left:0; top:18%; bottom:18%;
                 width:3px; border-radius:3px; background:var(--accent); }
        .nav-ico { flex:0 0 24px; width:24px; text-align:center; font-size:1.15rem; line-height:1; }
        .nav-label { overflow:hidden; transition:opacity .15s ease; }
        /* État réduit : icônes centrées, labels cachés, tooltip au survol */
        :root[data-sidebar="collapsed"] .brand,
        :root[data-sidebar="collapsed"] .nav-label { opacity:0; width:0; }
        :root[data-sidebar="collapsed"] .nav-item { justify-content:center; gap:0; }
        :root[data-sidebar="collapsed"] .nav-item:hover::after {
            content:attr(data-label); position:absolute; left:calc(100% + 10px); top:50%;
            transform:translateY(-50%); background:var(--text); color:var(--bg);
            padding:0.3rem 0.55rem; border-radius:6px; font-size:0.82rem; font-weight:600;
            white-space:nowrap; z-index:1200; box-shadow:var(--shadow-lg); pointer-events:none;
        }
        .app-main { flex:1; min-width:0; display:flex; flex-direction:column; }
        .topbar { display:none; align-items:center; gap:0.6rem; padding:0.55rem 1rem;
                 background:var(--sidebar-bg); border-bottom:1px solid var(--border);
                 position:sticky; top:0; z-index:1000; }
        .menu-btn { background:none; border:1px solid var(--border); color:var(--text);
                 width:40px; height:40px; border-radius:var(--radius-sm); cursor:pointer; font-size:1.2rem; }
        .sb-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1050; }

        main { width:100%; max-width:1080px; margin:1.75rem auto; padding:0 1.5rem; flex:1;
               animation:page-in .35s ease both; }
        main.wide { max-width:1400px; }
        @keyframes page-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
                padding:1.1rem 1.35rem; margin-bottom:1.1rem; box-shadow:var(--shadow); }
        table { width:100%; border-collapse: collapse; }
        th, td { text-align:left; padding:0.5rem 0.6rem; border-bottom:1px solid var(--border); }
        th { color:var(--muted); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.03em; }
        tbody tr { transition:background .12s; }
        tbody tr:hover td { background:var(--accent-soft); }
        /* Couleur du texte verrouillée pour tous les états : les boutons sont des
           liens <a>, sans quoi les règles a:visited/a:hover (plus spécifiques que
           .btn) repeignent le texte en --accent — identique au fond (issue #26). */
        .btn, .btn:visited, .btn:hover { display:inline-block; background:var(--accent);
               color:#fff; padding:0.5rem 0.95rem; border-radius:var(--radius-sm); text-decoration:none;
               border:none; cursor:pointer; font-size:0.95rem; box-shadow:var(--shadow);
               transition:transform .12s ease, filter .15s ease, box-shadow .15s ease; }
        .btn:hover { transform:translateY(-1px); filter:brightness(1.06); box-shadow:var(--shadow-lg); }
        .btn:active { transform:translateY(0); }
        .btn.secondary, .btn.secondary:visited, .btn.secondary:hover {
               background:var(--chip-bg); color:var(--chip-text); }
        .badge { display:inline-block; background:var(--chip-bg); color:var(--chip-text); padding:0.15rem 0.55rem;
                 border-radius:999px; font-size:0.8rem; }
        /* Interrupteur actif/inactif d'un site (issue #32). */
        .switch { position:relative; display:inline-block; width:38px; height:20px; vertical-align:middle; margin:0; }
        .switch input { opacity:0; width:0; height:0; }
        .switch .slider { position:absolute; inset:0; cursor:pointer; background:var(--track);
                 border:1px solid var(--border); border-radius:999px; transition:0.2s; }
        .switch .slider::before { content:""; position:absolute; height:14px; width:14px; left:2px; top:2px;
                 background:#fff; border-radius:50%; transition:0.2s; }
        .switch input:checked + .slider { background:var(--accent); border-color:var(--accent); }
        .switch input:checked + .slider::before { transform:translateX(18px); }
        form p { margin:0.6rem 0; }
        label { display:block; font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
        input, select, textarea { width:100%; padding:0.5rem 0.6rem; border:1px solid var(--border);
                 border-radius:var(--radius-sm); font:inherit; background:var(--input-bg); color:var(--text);
                 transition:border-color .15s, box-shadow .15s; }
        input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent);
                 box-shadow:0 0 0 3px var(--accent-soft); }
        input[type=checkbox] { width:auto; }
        .messages { list-style:none; padding:0; }
        .messages li { background:var(--msg-bg); border:1px solid var(--msg-border); padding:0.6rem 0.9rem;
                 border-radius:var(--radius-sm); margin-bottom:0.5rem; }
        .muted { color: var(--muted); }
        .row-actions a, .row-actions form { margin-right:0.5rem; }
        .linklike { background:none; border:none; padding:0; color:var(--accent); cursor:pointer;
                 font:inherit; text-decoration:underline; }
        /* Actions de ligne sous forme d'icônes (issue #52). */
        .act-row { display:flex; gap:0.35rem; align-items:center; flex-wrap:nowrap; white-space:nowrap; }
        .act-row form { margin:0; display:inline-flex; }
        .icon-btn, .icon-btn:visited, .icon-btn:hover { display:inline-flex; align-items:center;
                 justify-content:center; width:34px; height:34px; padding:0; border:1px solid var(--border);
                 border-radius:var(--radius-sm); background:var(--card); color:var(--text); cursor:pointer;
                 font-size:1rem; line-height:1; text-decoration:none; box-shadow:var(--shadow);
                 transition:transform .12s ease, filter .15s, background .15s, border-color .15s; }
        .icon-btn:hover { transform:translateY(-1px); background:var(--chip-bg); box-shadow:var(--shadow-lg); }
        .icon-btn:active { transform:translateY(0); }
        .icon-btn.danger:hover { background:rgba(224,88,75,0.16); border-color:#e0584b; }
        /* Étoile « CV par défaut » (issue #52) : on/off graphique. */
        .icon-btn.star { filter:grayscale(1); opacity:0.55; }
        .icon-btn.star:hover { filter:none; opacity:1; }
        .icon-btn.star.is-default { filter:none; opacity:1; border-color:var(--accent);
                 background:var(--accent-soft); }
        /* Progress bars / steps, shared across pages */
        .bar-track { display:block; background:var(--track); border-radius:6px; height:0.85rem; overflow:hidden; }
        .bar-fill { display:block; height:100%; background:var(--accent); border-radius:6px; min-width:2px; }
        .steps { display:flex; flex-wrap:wrap; gap:0.5rem; }
        .step { background:var(--chip-bg); color:var(--muted); padding:0.2rem 0.6rem; border-radius:999px; font-size:0.85rem; }
        .step.done { background:var(--accent); color:#fff; }
        /* Forms: sections + grids */
        fieldset { border:1px solid var(--border); border-radius:var(--radius); padding:0.5rem 1rem 1rem; margin:0 0 1rem; }
        legend { font-weight:700; color:var(--accent); padding:0 0.4rem; }
        .field { margin:0.5rem 0; }
        .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:0 1rem; }
        .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 1rem; }
        .checks { display:flex; flex-wrap:wrap; gap:0.5rem 1.25rem; margin:0.4rem 0 0.9rem; }
        .check { display:flex; align-items:center; gap:0.4rem; font-weight:500; cursor:pointer; }
        .error { color:#e0584b; display:block; font-size:0.85rem; }
        .form-actions { display:flex; gap:0.5rem; margin-top:0.5rem; }
        @media (max-width:560px) { .grid2, .grid3 { grid-template-columns:1fr; } }
        /* Modal (native dialog) */
        dialog { border:none; border-radius:var(--radius); padding:0; width:92%; max-width:680px;
                 max-height:88vh; overflow:auto; background:var(--card); color:var(--text);
                 box-shadow:var(--shadow-lg); }
        dialog::backdrop { background:rgba(0,0,0,0.5); }
        .modal-body { padding:1.25rem 1.5rem; }
        .modal-body h2 { margin-top:0; }
        /* Mini progress bar in lists */
        .mini-bar { display:inline-block; vertical-align:middle; width:90px; height:8px;
                 background:var(--track); border-radius:4px; overflow:hidden; }
        .mini-bar span { display:block; height:100%; background:var(--accent); }
        /* List search + closed (stopped) rows (issues #10, #11) */
        .list-search { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        th a { color:inherit; text-decoration:none; }
        th a:hover { color:var(--accent); }
        .closed-row { opacity:0.55; }
        .closed-row td { background:rgba(224,88,75,0.06); }
        .src-logo { height:16px; width:16px; object-fit:contain; vertical-align:middle; margin-right:0.35rem; border-radius:3px; }
        /* Logo + libellé de la source sur une seule ligne (issue #52). */
        .src-cell { display:inline-flex; align-items:center; white-space:nowrap; }
        /* Menu déroulant (téléchargement d'un CV par format, issue #52). */
        .dd { position:relative; display:inline-block; }
        .dd > summary { list-style:none; cursor:pointer; }
        .dd > summary::-webkit-details-marker { display:none; }
        .dd-menu { position:absolute; z-index:40; top:calc(100% + 4px); left:0; min-width:200px;
                 background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm);
                 box-shadow:var(--shadow-lg); padding:0.3rem; }
        .dd-menu a { display:block; padding:0.42rem 0.6rem; border-radius:var(--radius-sm); color:var(--text);
                 text-decoration:none; font-size:0.9rem; white-space:nowrap; }
        .dd-menu a:hover { background:var(--chip-bg); }
        .dd-sep { height:1px; background:var(--border); margin:0.3rem 0; }
        /* Sélecteur de source avec favicon (issue #52). */
        .source-dd { display:block; }
        .source-dd .source-summary { display:flex; align-items:center; width:100%;
                 justify-content:flex-start; font:inherit; font-weight:400; }
        .source-dd .dd-menu { width:100%; max-height:260px; overflow:auto; }
        .source-dd .dd-menu a { display:flex; align-items:center; }
        /* Toasts (issue #13) */
        .toast-container { position:fixed; top:1rem; right:1rem; z-index:1500;
                 display:flex; flex-direction:column; gap:0.5rem; max-width:360px; }
        .toast { background:var(--card); color:var(--text); border:1px solid var(--border);
                 border-left:4px solid var(--accent); border-radius:var(--radius-sm); padding:0.7rem 1rem;
                 box-shadow:var(--shadow-lg); font-size:0.92rem;
                 opacity:0; transform:translateX(20px); transition:opacity .25s ease, transform .25s ease; }
        .toast.show { opacity:1; transform:translateX(0); }
        .toast.success { border-left-color:#27a567; }
        .toast.error, .toast.danger { border-left-color:#e0584b; }
        .toast.warning { border-left-color:#d98a00; }
        .toast.info, .toast.debug { border-left-color:var(--accent); }
        /* Coaching IA (issue #33) : spinner d'attente + rendu du résultat */
        .spinner { width:34px; height:34px; border:3px solid var(--track);
                 border-top-color:var(--accent); border-radius:50%;
                 animation:spin 0.8s linear infinite; margin:1.5rem auto; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .ai-loading { text-align:center; color:var(--muted); padding:1rem 0; }
        .ai-result { white-space:pre-wrap; line-height:1.5; }
        .ai-result h3 { color:var(--accent); margin:1rem 0 0.4rem; font-size:1.05rem; }
        .ai-result ul { margin:0.3rem 0 0.6rem; padding-left:1.2rem; }
        .ai-error { color:#e0584b; }
        .ai-meta { margin:0.75rem 0 0; font-size:0.8rem; color:var(--muted); font-style:italic; }
        .ai-warning { background:rgba(217,138,0,0.12); border:1px solid #d98a00; color:var(--text);
                 border-radius:8px; padding:0.5rem 0.75rem; margin-bottom:0.75rem; font-size:0.9rem; }
        .ai-actions { display:flex; gap:0.5rem; margin-top:1rem; flex-wrap:wrap; }
        /* Sélecteur de thème par vignettes (page Options, issue #33) */
        .theme-picker { display:flex; gap:0.75rem; flex-wrap:wrap; }
        .theme-choice { display:flex; flex-direction:column; align-items:center; gap:0.35rem;
                 background:var(--card); border:2px solid var(--border); border-radius:10px;
                 padding:0.5rem; cursor:pointer; color:var(--text); font:inherit; font-size:0.85rem; }
        .theme-choice svg { border-radius:6px; display:block; box-shadow:0 1px 4px rgba(0,0,0,0.15); }
        .theme-choice:hover { border-color:var(--accent); }
        .theme-choice.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
        /* Page Options en catégories (issue #34) : nav latérale + panneaux */
        .options-layout { display:flex; gap:1.25rem; align-items:flex-start; }
        .options-nav { display:flex; flex-direction:column; gap:0.25rem; min-width:190px; flex-shrink:0; }
        .options-tab { text-align:left; background:none; border:1px solid transparent; border-radius:8px;
                 padding:0.6rem 0.8rem; cursor:pointer; color:var(--text); font:inherit; font-size:0.95rem; }
        .options-tab:hover { background:var(--chip-bg); }
        .options-tab.active { background:var(--accent); color:#fff; }
        .options-content { flex:1; min-width:0; }
        /* Rappel des quotas du tier gratuit IA (issue #38) */
        .ai-quota-info { font-size:0.85rem; background:var(--chip-bg); border-radius:8px;
                 padding:0.5rem 0.7rem; margin:0.5rem 0; line-height:1.4; }
        @media (max-width:640px) {
            .options-layout { flex-direction:column; }
            .options-nav { flex-direction:row; flex-wrap:wrap; width:100%; }
        }
        /* Pied de page (issue #20) */
        .site-footer { padding:1.25rem; text-align:center; color:var(--muted); font-size:0.85rem;
                 border-top:1px solid var(--border); }
        .site-footer a { color:var(--accent); }

        /* ===== Responsive mobile (issue #35) ===== */
        @media (max-width:768px) {
            .topbar { display:flex; }
            .sidebar { position:fixed; top:0; left:0; height:100vh; --sb-w:264px;
                     transform:translateX(-100%); transition:transform .25s ease; }
            :root[data-sidebar="collapsed"] .sidebar { --sb-w:264px; }
            :root[data-sidebar="collapsed"] .brand,
            :root[data-sidebar="collapsed"] .nav-label { opacity:1; width:auto; }
            :root[data-sidebar="collapsed"] .nav-item { justify-content:flex-start; gap:0.8rem; }
            :root.sidebar-open .sidebar { transform:none; box-shadow:var(--shadow-lg); }
            :root.sidebar-open .sb-backdrop { display:block; }
            .sidebar .sidebar-toggle { display:none; }  /* sur mobile : fermeture via backdrop ou lien */
            main { margin:1.1rem auto; padding:0 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar" aria-label="Navigation principale">
        <div class="sidebar-top">
            <button type="button" class="sidebar-toggle" id="sidebar-toggle"
                    title="Réduire / étendre le menu" aria-label="Réduire ou étendre le menu">☰</button>
            <span class="brand">CandiTrack</span>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item {% if request.path == '/' or '/candidatures' in request.path %}active{% endif %}"
               href="{% url 'tracking:candidature_list' %}" data-label="Candidatures">
               <span class="nav-ico" aria-hidden="true">📋</span><span class="nav-label">Candidatures</span></a>
            <a class="nav-item {% if '/sites' in request.path %}active{% endif %}"
               href="{% url 'tracking:site_list' %}" data-label="Sites">
               <span class="nav-ico" aria-hidden="true">🌐</span><span class="nav-label">Sites</span></a>
            <a class="nav-item {% if '/stats' in request.path %}active{% endif %}"
               href="{% url 'tracking:stats' %}" data-label="Statistiques">
               <span class="nav-ico" aria-hidden="true">📊</span><span class="nav-label">Statistiques</span></a>
            <a class="nav-item {% if '/cv' in request.path %}active{% endif %}"
               href="{% url 'tracking:cv_list' %}" data-label="CV">
               <span class="nav-ico" aria-hidden="true">📄</span><span class="nav-label">CV</span></a>
        </nav>
        <div class="sidebar-foot">
            <a class="nav-item {% if '/aide' in request.path %}active{% endif %}"
               href="{% url 'tracking:help' %}" data-label="Options">
               <span class="nav-ico" aria-hidden="true">⚙️</span><span class="nav-label">Options</span></a>
        </div>
    </aside>

    <div class="app-main">
        <div class="topbar">
            <button type="button" class="menu-btn" id="menu-btn" aria-label="Ouvrir le menu">☰</button>
            <span class="brand">CandiTrack</span>
        </div>
        <main class="{% block main_class %}{% endblock %}">
            {% block content %}{% endblock %}
        </main>
        <footer class="site-footer">
            © {% now "Y" %} CandiTrack — conçu par
            <a href="https://github.com/lenoirpatrick" target="_blank" rel="noopener">Patrick Lenoir</a>
            avec <a href="https://claude.com/claude-code" target="_blank" rel="noopener">Claude Code</a>.
        </footer>
    </div>
</div>
<div class="sb-backdrop" id="sb-backdrop"></div>

<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
{% if messages %}
<script id="toast-data" type="application/json">[{% for message in messages %}{"text": "{{ message|escapejs }}", "level": "{{ message.tags|escapejs }}"}{% if not forloop.last %},{% endif %}{% endfor %}]</script>
{% endif %}
<dialog id="ai-modal"><div class="modal-body" id="ai-modal-body"></div></dialog>
<script>
    var root = document.documentElement;

    // Ferme les menus déroulants ouverts au clic à l'extérieur (issue #52).
    document.addEventListener("click", function (e) {
        document.querySelectorAll("details.dd[open]").forEach(function (d) {
            if (!d.contains(e.target)) d.removeAttribute("open");
        });
    });

    // Sélecteur de source avec favicon (issue #52) : chaque choix renseigne
    // l'input caché et met à jour le résumé. Réutilisable après injection AJAX.
    window.initSourcePicker = function (root) {
        (root || document).querySelectorAll("details.source-dd").forEach(function (dd) {
            if (dd.dataset.bound) return;
            dd.dataset.bound = "1";
            var input = dd.parentNode.querySelector("input[type=hidden][name=source]");
            var summary = dd.querySelector(".source-summary");
            dd.querySelectorAll(".dd-menu a").forEach(function (a) {
                a.addEventListener("click", function (e) {
                    e.preventDefault();
                    if (input) input.value = a.dataset.value || "";
                    summary.textContent = "";
                    if (a.dataset.logo) {
                        var img = document.createElement("img");
                        img.src = a.dataset.logo; img.className = "src-logo"; img.alt = "";
                        summary.appendChild(img);
                    }
                    summary.appendChild(document.createTextNode((a.dataset.label || "") + " ▾"));
                    dd.removeAttribute("open");
                });
            });
        });
    };
    document.addEventListener("DOMContentLoaded", function () { window.initSourcePicker(document); });

    // Sidebar rétractable (issue #35) : état desktop persistant + tiroir mobile.
    (function () {
        var toggle = document.getElementById("sidebar-toggle");
        var menuBtn = document.getElementById("menu-btn");
        var backdrop = document.getElementById("sb-backdrop");
        function isMobile() { return window.matchMedia("(max-width:768px)").matches; }
        toggle.addEventListener("click", function () {
            var collapsed = root.getAttribute("data-sidebar") === "collapsed";
            root.setAttribute("data-sidebar", collapsed ? "expanded" : "collapsed");
            try { localStorage.setItem("sidebar", collapsed ? "expanded" : "collapsed"); } catch (e) {}
        });
        function closeMobile() { root.classList.remove("sidebar-open"); }
        menuBtn.addEventListener("click", function () { root.classList.toggle("sidebar-open"); });
        backdrop.addEventListener("click", closeMobile);
        document.querySelectorAll(".sidebar-nav .nav-item, .sidebar-foot .nav-item").forEach(function (a) {
            a.addEventListener("click", function () { if (isMobile()) closeMobile(); });
        });
    })();

    // Le thème se choisit depuis la page Options (issue #33) ; le pré-réglage
    // anti-flash en <head> applique la préférence stockée.

    // Toasts (issue #13) : remplace l'ancienne liste de messages.
    (function () {
        var container = document.getElementById("toast-container");
        function showToast(text, level) {
            var el = document.createElement("div");
            el.className = "toast " + ((level || "info").split(" ")[0] || "info");
            el.setAttribute("role", "status");
            el.textContent = text;
            container.appendChild(el);
            requestAnimationFrame(function () { el.classList.add("show"); });
            setTimeout(function () {
                el.classList.remove("show");
                setTimeout(function () { el.remove(); }, 300);
            }, 4000);
        }
        // Exposé pour déclencher un toast depuis n'importe quelle page.
        window.toast = showToast;

        var data = document.getElementById("toast-data");
        if (data) {
            try {
                JSON.parse(data.textContent).forEach(function (m) {
                    showToast(m.text, m.level);
                    // Easter egg (issue #23) : confettis si le message est tagué.
                    if (m.level && m.level.indexOf("confetti") >= 0) {
                        launchConfetti();
                    }
                });
            } catch (e) {}
        }
    })();

    // Confettis (issue #23) — animation canvas légère, sans dépendance.
    function launchConfetti() {
        var canvas = document.createElement("canvas");
        canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;" +
            "pointer-events:none;z-index:2000;";
        document.body.appendChild(canvas);
        var ctx = canvas.getContext("2d");
        function size() { canvas.width = innerWidth; canvas.height = innerHeight; }
        size();
        window.addEventListener("resize", size);

        var colors = ["#5bc0be", "#3a506b", "#27a567", "#d98a00", "#e0584b", "#1c2541"];
        var pieces = [];
        for (var i = 0; i < 160; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: -20 - Math.random() * canvas.height,
                r: 5 + Math.random() * 6,
                c: colors[(Math.random() * colors.length) | 0],
                vy: 2 + Math.random() * 3.5,
                vx: -1.5 + Math.random() * 3,
                rot: Math.random() * Math.PI,
                vr: -0.2 + Math.random() * 0.4
            });
        }
        var start = performance.now();
        (function frame(now) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(function (p) {
                p.x += p.vx; p.y += p.vy; p.rot += p.vr;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.c;
                ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
                ctx.restore();
            });
            if (now - start < 3500) {
                requestAnimationFrame(frame);
            } else {
                window.removeEventListener("resize", size);
                canvas.remove();
            }
        })(start);
    }
    window.launchConfetti = launchConfetti;

    // Coaching IA (issue #33) : modal partagé qui appelle un endpoint POST,
    // affiche un spinner pendant l'attente, puis le texte généré (Markdown léger).
    (function () {
        var modal = document.getElementById("ai-modal");
        if (!modal) return;
        var body = document.getElementById("ai-modal-body");
        var token = (document.querySelector('meta[name="csrf-token"]') || {}).content || "";

        function escapeHtml(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        // Rendu Markdown minimal et sûr : on échappe d'abord, puis on applique
        // titres (##, ###), gras (**), et listes à puces (- / *).
        function renderMarkdown(text) {
            var lines = escapeHtml(text).split("\n");
            var html = "", inList = false;
            function closeList() { if (inList) { html += "</ul>"; inList = false; } }
            lines.forEach(function (line) {
                var bullet = line.match(/^\s*[-*]\s+(.*)$/);
                var h = line.match(/^(#{2,3})\s+(.*)$/);
                if (bullet) {
                    if (!inList) { html += "<ul>"; inList = true; }
                    html += "<li>" + inline(bullet[1]) + "</li>";
                } else if (h) {
                    closeList();
                    html += "<h3>" + inline(h[2]) + "</h3>";
                } else if (line.trim() === "") {
                    closeList();
                    html += "\n";
                } else {
                    closeList();
                    html += inline(line) + "\n";
                }
            });
            closeList();
            return html;
        }
        function inline(s) {
            return s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        }

        function actions(retryLabel, onRetry, copyText) {
            var wrap = document.createElement("div");
            wrap.className = "ai-actions";
            var retry = document.createElement("button");
            retry.className = "btn secondary";
            retry.textContent = retryLabel;
            retry.addEventListener("click", onRetry);
            wrap.appendChild(retry);
            if (copyText) {
                var copy = document.createElement("button");
                copy.className = "btn secondary";
                copy.textContent = "Copier";
                copy.addEventListener("click", function () {
                    navigator.clipboard.writeText(copyText).then(function () {
                        if (window.toast) window.toast("Copié dans le presse-papier.", "success");
                    });
                });
                wrap.appendChild(copy);
            }
            var close = document.createElement("button");
            close.className = "btn";
            close.textContent = "Fermer";
            close.addEventListener("click", function () { modal.close(); });
            wrap.appendChild(close);
            return wrap;
        }

        function run(opts) {
            body.innerHTML = '<h2>' + escapeHtml(opts.title) + '</h2>' +
                '<div class="ai-loading"><div class="spinner"></div>' +
                escapeHtml(opts.loading || "L'IA réfléchit…") + '</div>';
            if (!modal.open) modal.showModal();

            fetch(opts.url, {
                method: "POST",
                headers: {"X-CSRFToken": token, "X-Requested-With": "XMLHttpRequest"}
            }).then(function (r) {
                return r.json().then(function (data) { return {ok: r.ok, data: data}; });
            }).then(function (res) {
                body.innerHTML = '<h2>' + escapeHtml(opts.title) + '</h2>';
                var content = document.createElement("div");
                if (res.ok && res.data.ok) {
                    if (res.data.warning) {
                        var warn = document.createElement("div");
                        warn.className = "ai-warning";
                        warn.textContent = "⚠️ " + res.data.warning;
                        body.appendChild(warn);
                    }
                    content.className = "ai-result";
                    content.innerHTML = renderMarkdown(res.data.text);
                    body.appendChild(content);
                    if (res.data.provider) {
                        var meta = document.createElement("p");
                        meta.className = "ai-meta";
                        meta.textContent = "Généré par " + res.data.provider +
                            (res.data.model ? " · " + res.data.model : "");
                        body.appendChild(meta);
                    }
                    body.appendChild(actions("Régénérer", function () { run(opts); }, res.data.text));
                } else {
                    content.className = "ai-error";
                    content.textContent = res.data.error || "Une erreur est survenue.";
                    body.appendChild(content);
                    body.appendChild(actions("Réessayer", function () { run(opts); }, null));
                }
            }).catch(function () {
                body.innerHTML = '<h2>' + escapeHtml(opts.title) + '</h2>' +
                    '<div class="ai-error">Impossible de contacter le serveur.</div>';
                body.appendChild(actions("Réessayer", function () { run(opts); }, null));
            });
        }

        // API publique : window.openAiModal({title, url, loading})
        window.openAiModal = run;
        modal.addEventListener("click", function (e) { if (e.target === modal) modal.close(); });
    })();
</script>
</body>
</html>
